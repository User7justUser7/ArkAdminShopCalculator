<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>247 Always Online - Admin Shop</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #e9ebe9;
      font-family: "Rajdhani", sans-serif;
    }

    button,
    input,
    select {
      font-family: "Rajdhani", sans-serif;
    }

    button {
      cursor: pointer;
    }

    .qty-input {
      width: 60px;
      text-align: center;
      padding: 4px 2px;
      font-weight: 700;
      border: 1px solid #88a8b4;
      background: #f4f8f8;
      font-size: 0.95rem;
      appearance: textfield;
      -moz-appearance: textfield;
    }

    .qty-input::-webkit-outer-spin-button,
    .qty-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .top-bar {
      background: #1a3a46;
      padding: 10px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      height: 50px;
    }

    .top-bar-content {
      display: flex;
      flex-direction: column;
    }

    .top-bar-title {
      font-family: "Cinzel", serif;
      font-size: 1.3rem;
      color: #d0e1e4;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
    }

    .top-bar-subtitle {
      font-size: 0.55rem;
      color: #7a9aa4;
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    .nav-bar {
      background: #1a3a46;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 50px;
      z-index: 99;
      min-height: 44px;
    }

    .nav-buttons {
      display: flex;
      gap: 4px;
      min-width: 0;
      width: 100%;
    }

    .nav-btn {
      background: transparent;
      color: #d0e1e4;
      border: 1px solid #7a9aa4;
      padding: 5px 12px;
      font-size: 0.8rem;
      font-weight: 600;
      white-space: nowrap;
      min-width: 60px;
      text-align: center;
      flex: 0 1 auto;
    }

    .nav-btn.active {
      background: #d0e1e4;
      color: #1a3a46;
      border-color: #d0e1e4;
    }

    .nav-btn-cart {
      flex: 1 1 auto;
      min-width: 145px;
      max-width: 340px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .admin-btn {
      background: transparent;
      color: #7a9aa4;
      border: 1px solid #4a6a74;
      padding: 5px 12px;
      font-size: 0.8rem;
      margin-left: 8px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .admin-btn.active {
      background: #ffffff22;
      color: #d0e1e4;
      border-color: #d0e1e4;
    }

    .shop-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 8px;
    }

    .shop-card {
      background: #d0e1e4;
      border: 2px solid #a8c0c8;
      border-radius: 4px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      height: 320px;
    }

    .shop-card.in-cart {
      border-color: #2a5a6a;
    }

    .card-icon {
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .card-name {
      height: 38px;
      font-family: "Cinzel", serif;
      font-size: 0.78rem;
      font-weight: 700;
      color: #1a3a46;
      margin-top: 4px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .card-cat {
      height: 14px;
      font-size: 0.62rem;
      color: #7a9aa4;
      text-transform: uppercase;
      flex-shrink: 0;
      overflow: hidden;
      white-space: nowrap;
    }

    .card-desc {
      height: 34px;
      font-size: 0.72rem;
      color: #4a6a74;
      margin-top: 3px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .card-price {
      min-height: 22px;
      display: flex;
      align-items: center;
      font-size: 0.95rem;
      color: #2a5a6a;
      font-weight: 700;
      margin-top: 4px;
      flex-shrink: 0;
    }

    .card-price span {
      font-size: 0.66rem;
      color: #4a6a74;
      margin-left: 4px;
    }

    .card-action {
      margin-top: auto;
      padding-top: 8px;
      flex-shrink: 0;
      min-height: 44px;
    }

    .list-row {
      display: grid;
      grid-template-columns: 40px 1fr 95px 150px;
      gap: 8px;
      align-items: center;
      padding: 8px 12px;
      background: #d0e1e4;
      border: 1px solid #a8c0c8;
      border-radius: 4px;
      min-height: 58px;
    }

    .list-row.in-cart {
      background: #c0d4d8;
      border-color: #2a5a6a;
    }

    .list-name {
      font-family: "Cinzel", serif;
      font-size: 0.78rem;
      color: #1a3a46;
      font-weight: 700;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .list-cat {
      font-size: 0.62rem;
      color: #7a9aa4;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .list-price {
      text-align: right;
      color: #2a5a6a;
      font-weight: 700;
      font-size: 0.82rem;
      white-space: nowrap;
      padding-right: 8px;
    }

    .list-qty {
      display: flex;
      justify-content: flex-end;
    }

    .icon-frame {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-radius: 6px;
      background: transparent;
      border: none;
      color: #1a3a46;
      font-weight: 700;
    }

    .icon-frame img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .icon-fallback {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      font-size: 1.3rem;
      line-height: 1;
    }

    @media (max-width: 600px) {
      .top-bar {
        padding: 8px 12px;
        height: auto;
        min-height: 50px;
        text-align: center;
      }

      .top-bar-content {
        align-items: center;
      }

      .top-bar-title {
        font-size: 1rem;
      }

      .top-bar-subtitle {
        font-size: 0.5rem;
      }

      .nav-bar {
        top: auto;
        position: relative;
        height: auto;
        padding: 6px 8px;
      }

      .nav-btn {
        padding: 4px 5px;
        font-size: 0.66rem;
        min-width: 0;
        flex: 1;
      }

      .nav-btn-cart {
        min-width: 0;
        max-width: none;
        flex: 1.35;
        font-size: 0.6rem;
      }

      .admin-btn {
        display: none;
      }

      .shop-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 6px;
      }

      .shop-card {
        height: 300px;
        padding: 10px;
      }

      .card-icon {
        height: 46px;
      }

      .card-name {
        height: 34px;
        font-size: 0.72rem;
      }

      .card-desc {
        height: 38px;
        font-size: 0.68rem;
      }

      .card-price {
        font-size: 0.9rem;
      }

      .list-row {
        grid-template-columns: 40px 1fr 90px;
        padding: 8px;
        gap: 6px;
        min-height: 80px;
      }

      .list-row > *:nth-child(1) {
        grid-column: 1;
        grid-row: 1;
      }

      .list-row > *:nth-child(2) {
        grid-column: 2;
        grid-row: 1;
      }

      .list-row > *:nth-child(3) {
        grid-column: 3;
        grid-row: 1;
      }

      .list-row > *:nth-child(4) {
        grid-column: 1 / -1;
        grid-row: 2;
        justify-self: stretch;
      }

      .list-price {
        padding-right: 0;
        font-size: 0.8rem;
      }

      .list-qty {
        justify-content: center;
      }

      .qty-input {
        width: 60px;
        padding: 3px 2px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function normalizeMaterial(name) {
      if (!name) return "";
      name = String(name).trim();
      const lower = name.toLowerCase();
      if (lower === "metal ingot" || lower === "metal ingot or scrap metal ingot") return "Metal Ingots";
      if (lower === "raw metal" || lower === "metal or scrap metal" || lower === "scrap metal") return "Metal";
      if (lower === "wood or fungal wood" || lower === "fungal wood") return "Wood";
      if (lower === "polymer, organic polymer, or corrupted nodule" || lower === "polymer or organic polymer") return "Polymer";
      if (lower === "organic polymer or corrupted nodule") return "Organic Polymer";
      if (lower === "cementing paste or achatina paste") return "Cementing Paste";
      if (lower === "crystal or primal crystal") return "Crystal";
      if (lower === "pelt, hair, or wool") return "Pelt";
      if (lower === "silica pearls or silicate") return "Silica Pearls";
      if (lower === "black pearl") return "Black Pearls";
      if (lower.includes("gem")) {
        if (lower.includes("blue")) return "Blue Gems";
        if (lower.includes("red")) return "Red Gems";
        if (lower.includes("green")) return "Green Gems";
      }
      return name;
    }

    function formatMetalIngot(amount) {
      const rounded = Math.round(amount);
      return rounded === 1 ? "Metal Ingot" : "Metal Ingots";
    }

    // Each material row's subtotal is individually ceil'd, then summed.
    // This means rounding happens per-row rather than on the grand total.
    function computeFormulaPrice(recipe, engramInput, materialTiers) {
      const engramLevel = Math.max(0, Number(engramInput || 0));
      const tiers = materialTiers || {};
      const roundedMaterialMetal = normalizeRecipeDraft(recipe).reduce((sum, row) => {
        const normalized = normalizeMaterial(row.material);
        const rate = (tiers[normalized] !== undefined) ? tiers[normalized] : (tiers[row.material] || 0);
        return sum + Math.ceil(row.qty * rate);
      }, 0);
      const materialValue = roundedMaterialMetal * 2;
      const engramValue = engramLevel * 2;
      const ignoredEngram = engramValue > materialValue;
      const price = Math.round(materialValue + (ignoredEngram ? 0 : engramValue));

      return {
        rawMaterialMetal: roundedMaterialMetal,
        roundedMaterialMetal,
        materialValue,
        engramLevel,
        ignoredEngram,
        price
      };
    }

    const C = {
      bg: "#e9ebe9",
      bg2: "#d0e1e4",
      bg3: "#c0d4d8",
      border: "#a8c0c8",
      border2: "#88a8b4",
      accent: "#2a5a6a",
      accentDark: "#1a3a46",
      text: "#1a2a30",
      dim: "#4a6a74",
      mute: "#7a9aa4",
      white: "#f4f8f8",
      green: "#2a7a4a",
      red: "#9a3030"
    };

    const btn = (variant = "secondary") => {
      const map = {
        primary: { bg: C.accent, color: C.white, border: C.accent },
        secondary: { bg: C.bg3, color: C.text, border: C.border2 },
        danger: { bg: "#f0d8d8", color: C.red, border: "#d0a0a0" },
        ghost: { bg: "transparent", color: C.accent, border: C.accent }
      };
      const style = map[variant] || map.secondary;
      return {
        background: style.bg,
        color: style.color,
        border: `1px solid ${style.border}`,
        padding: "5px 10px",
        fontWeight: 700,
        fontSize: "0.8rem"
      };
    };

    const inputStyle = {
      background: C.white,
      border: `1px solid ${C.border}`,
      color: C.text,
      padding: "5px 8px",
      fontSize: "0.85rem",
      width: "100%"
    };

    const labelStyle = {
      fontSize: "0.65rem",
      color: C.dim,
      textTransform: "uppercase",
      display: "block",
      marginBottom: "2px"
    };

    const sectionStyle = {
      background: C.bg2,
      border: `1px solid ${C.border}`,
      padding: "14px 16px",
      marginBottom: "12px",
      borderRadius: "4px"
    };

    const sectionTitleStyle = {
      fontFamily: "'Cinzel', serif",
      color: C.accentDark,
      fontSize: "0.85rem",
      marginBottom: "12px",
      paddingBottom: "6px",
      borderBottom: `1px solid ${C.border}`
    };

    function blankRecipeRow() {
      return { material: "", qty: "" };
    }

    function emptyItemDraft() {
      return {
        icon: "\u{1F4E6}",
        name: "",
        category: "",
        desc: "",
        fixed: true,
        price: "",
        engram: "",
        recipe: [blankRecipeRow()]
      };
    }

    function getOrderIdFromHash() {
      const hash = window.location.hash;
      if (!hash.startsWith("#order=")) return null;
      return hash.slice(7);
    }

    function looksLikeImageValue(value) {
      if (!value) return false;
      const v = String(value).trim().toLowerCase();
      return v.startsWith("http://") || v.startsWith("https://") || v.startsWith("data:image/");
    }

    function normalizeRecipeDraft(recipe) {
      if (!Array.isArray(recipe)) return [];
      return recipe
        .map((row) => ({
          material: String(row?.material || "").trim(),
          qty: Number(row?.qty || 0)
        }))
        .filter((row) => row.material && row.qty > 0);
    }

    function toEditableItem(item) {
      return {
        ...item,
        price: String(item?.price ?? ""),
        engram: String(item?.engram ?? ""),
        recipe: Array.isArray(item?.recipe) && item.recipe.length
          ? item.recipe.map((row) => ({ material: row.material, qty: String(row.qty ?? "") }))
          : [blankRecipeRow()]
      };
    }

    function validateDraft(draft) {
      if (!String(draft.name || "").trim()) return "Item name is required.";
      if (!String(draft.category || "").trim()) return "Category is required.";

      if (draft.fixed) {
        const price = Number(draft.price);
        if (Number.isNaN(price) || price < 0) return "Fixed price must be 0 or higher.";
        return "";
      }

      const recipe = normalizeRecipeDraft(draft.recipe);
      if (recipe.length === 0) return "Add at least one recipe material with a quantity.";

      const engramLevel = Number(draft.engram || 0);
      if (Number.isNaN(engramLevel) || engramLevel < 0) return "Engram Level must be 0 or higher.";

      return "";
    }

    function buildItemFromDraft(draft, id, materialTiers) {
      const base = {
        id,
        name: String(draft.name || "").trim(),
        category: String(draft.category || "").trim(),
        icon: String(draft.icon || "\u{1F4E6}").trim() || "\u{1F4E6}",
        desc: String(draft.desc || "").trim(),
        fixed: Boolean(draft.fixed)
      };

      if (base.fixed) {
        return {
          ...base,
          price: Number(draft.price || 0),
          engram: 0,
          recipe: []
        };
      }

      const recipe = normalizeRecipeDraft(draft.recipe);
      const details = computeFormulaPrice(recipe, draft.engram, materialTiers);

      return {
        ...base,
        price: details.price,
        engram: Number(draft.engram || 0),
        recipe
      };
    }

    function updateDraft(setter, field, value) {
      setter((current) => ({ ...current, [field]: value }));
    }

    function updateDraftRecipe(setter, value) {
      setter((current) => ({ ...current, recipe: value }));
    }

    function ItemIcon({ icon, size = 34, fallback = "\u{1F4E6}" }) {
      const [failed, setFailed] = useState(false);
      const imageValue = !failed && looksLikeImageValue(icon);
      const label = imageValue ? fallback : String(icon || fallback);

      return (
        <span
          className="icon-frame"
          style={{ width: `${size}px`, height: `${size}px`, fontSize: `${Math.max(14, size * 0.55)}px` }}
        >
          {imageValue ? (
            <img src={icon} alt="" onError={() => setFailed(true)} />
          ) : (
            <span className="icon-fallback">{label}</span>
          )}
        </span>
      );
    }

    function RecipeEditor({ recipe, onChange, allMaterials, disabled = false }) {
      const rows = Array.isArray(recipe) && recipe.length ? recipe : [blankRecipeRow()];
      const [searches, setSearches] = React.useState({});

      function updateRow(index, key, value) {
        onChange(rows.map((row, rowIndex) => (rowIndex === index ? { ...row, [key]: value } : row)));
      }

      function removeRow(index) {
        if (rows.length === 1) {
          onChange([blankRecipeRow()]);
          return;
        }
        onChange(rows.filter((_, rowIndex) => rowIndex !== index));
      }

      return (
        <div style={{ display: "grid", gap: "6px" }}>
          {rows.map((row, index) => {
            const searchTerm = (searches[index] || "").toLowerCase();
            const filteredMaterials = searchTerm 
              ? (allMaterials || []).filter(m => m.toLowerCase().includes(searchTerm))
              : (allMaterials || []);

            return (
              <div
                key={index}
                style={{ display: "grid", gridTemplateColumns: "1fr 90px 42px", gap: "6px", alignItems: "center" }}
              >
                <div style={{ position: "relative", display: "flex", alignItems: "center" }}>
                  <input
                    list={`materials-${index}`}
                    value={row.material}
                    disabled={disabled}
                    onChange={(e) => updateRow(index, "material", e.target.value)}
                    onClick={(e) => {
                      if (e.target.showPicker) e.target.showPicker();
                    }}
                    onFocus={(e) => {
                      try {
                        if (e.target.showPicker) e.target.showPicker();
                      } catch (err) {}
                    }}
                    placeholder="Select or type material..."
                    style={{
                      background: "#f4f8f8",
                      border: "1px solid #a8c0c8",
                      color: "#1a2a30",
                      padding: "5px 24px 5px 8px",
                      fontSize: "0.82rem",
                      width: "100%",
                      borderRadius: "0",
                      outline: "none"
                    }}
                  />
                  <div style={{ 
                    position: "absolute", 
                    right: "8px", 
                    pointerEvents: "none", 
                    fontSize: "0.5rem", 
                    color: C.mute,
                    display: "flex",
                    flexDirection: "column"
                  }}>
                    ▼
                  </div>
                  <datalist id={`materials-${index}`}>
                    {filteredMaterials.map((m) => (
                      <option key={m} value={m} />
                    ))}
                  </datalist>
                </div>

                <input
                  type="number"
                  min="0"
                  step="1"
                  value={row.qty}
                  disabled={disabled}
                  onChange={(e) => updateRow(index, "qty", e.target.value)}
                  style={{
                    background: "#f4f8f8",
                    border: "1px solid #a8c0c8",
                    color: "#1a2a30",
                    padding: "5px 8px",
                    fontSize: "0.82rem",
                    width: "100%"
                  }}
                />

                <button
                  type="button"
                  onClick={() => removeRow(index)}
                  disabled={disabled}
                  style={{
                    background: "#f0d8d8",
                    color: "#9a3030",
                    border: "1px solid #d0a0a0",
                    padding: "5px 0",
                    fontWeight: 700
                  }}
                >
                  X
                </button>
              </div>
            );
          })}

          <div>
            <button
              type="button"
              disabled={disabled}
              onClick={() => onChange([...rows, blankRecipeRow()])}
              style={{
                background: "transparent",
                color: "#2a5a6a",
                border: "1px solid #2a5a6a",
                padding: "4px 10px",
                fontWeight: 700,
                fontSize: "0.75rem"
              }}
            >
              + Add Material
            </button>
          </div>
        </div>
      );
    }

    function TotalAmount({ amount, isMobile, currency }) {
      return (
        <span
          style={{
            fontFamily: "'Rajdhani', sans-serif",
            fontSize: isMobile ? "1.15rem" : "1.4rem",
            color: C.accent,
            fontWeight: 800,
            whiteSpace: "nowrap",
            lineHeight: 1
          }}
        >
          {amount.toLocaleString()} {currency}
        </span>
      );
    }

    function DraftPricing({ draft, formula, currency, materialTiers }) {
      if (draft.fixed) {
        return (
          <div style={{ display: "grid", gap: "4px", color: C.dim, fontSize: "0.78rem" }}>
            <div style={{ fontWeight: 700, color: C.accent }}>Fixed price item.</div>
            <div style={{ color: C.accent, fontWeight: 800, fontSize: "0.9rem" }}>
              Final Price: {(Number(draft.price || 0) || 0).toLocaleString()} {currency}
            </div>
          </div>
        );
      }

      const recipe = normalizeRecipeDraft(draft.recipe);
      const tiers = materialTiers || {};

      // Build per-row breakdown: ceil each row's subtotal individually
      const rowBreakdown = recipe.map((row) => {
        const normalized = normalizeMaterial(row.material);
        const rate = (tiers[normalized] !== undefined) ? tiers[normalized] : (tiers[row.material] || 0);
        const rawSubtotal = row.qty * rate;
        const ceilSubtotal = Math.ceil(rawSubtotal);
        return { ...row, rate, rawSubtotal, ceilSubtotal };
      });

      // Total is simply the sum of each row's already-ceiled value
      const roundedMaterialMetal = rowBreakdown.reduce((sum, r) => sum + r.ceilSubtotal, 0);
      const materialValue = roundedMaterialMetal * 2;
      const engramValue = (formula?.engramLevel || 0) * 2;
      const ignoredEngram = engramValue > materialValue;
      const price = Math.round(materialValue + (ignoredEngram ? 0 : engramValue));

      return (
        <div style={{ display: "grid", gap: "8px", color: C.dim, fontSize: "0.78rem", borderTop: `1px solid ${C.border}`, paddingTop: "8px", marginTop: "4px" }}>
          <div style={{ fontWeight: 700, color: C.accentDark }}>Material Conversion:</div>
          <div style={{ display: "grid", gap: "2px", paddingLeft: "8px" }}>
            {rowBreakdown.map((row, i) => {
              const didRound = row.ceilSubtotal !== row.rawSubtotal;
              return (
                <div key={i}>

    function QtyControls({ id, cart, setCart, addToCart, decCart, removeFromCart }) {
      const qty = cart[id] || 0;
      const [draft, setDraft] = useState(String(qty));

      useEffect(() => {
        setDraft(String(qty));
      }, [qty]);

      function commit(value) {
        const parsed = parseInt(value, 10);
        if (Number.isNaN(parsed) || parsed <= 0) removeFromCart(id);
        else setCart((current) => ({ ...current, [id]: parsed }));
      }

      if (!qty) return null;

      return (
        <div style={{ display: "flex", gap: "2px", alignItems: "center" }}>
          <button style={{ ...btn("secondary"), padding: "2px 4px", minWidth: "22px" }} onClick={() => decCart(id)}>-</button>
          <input
            className="qty-input"
            type="number"
            min="1"
            value={draft}
            onChange={(e) => setDraft(e.target.value)}
            onBlur={(e) => commit(e.target.value)}
            onKeyDown={(e) => {
              if (e.key === "Enter") {
                commit(e.target.value);
                e.target.blur();
              }
            }}
          />
          <button style={{ ...btn("primary"), padding: "2px 4px", minWidth: "22px" }} onClick={() => addToCart(id)}>+</button>
          <button style={{ ...btn("danger"), padding: "2px 4px", minWidth: "22px" }} onClick={() => removeFromCart(id)}>X</button>
        </div>
      );
    }

          setSaveStatus({ type: "saved", message: successMessage || "Saved." });

                  </button>
                </div>

                <div style={{ display: "flex", gap: "3px", flexWrap: "wrap", marginBottom: "10px" }}>
                  {categories.map((category) => (
                    <button
                      key={category}
                      onClick={() => setCatFilter(category)}
                      style={{
                        background: catFilter === category ? C.accent : "transparent",
                        color: catFilter === category ? C.white : C.dim,
                        border: `1px solid ${catFilter === category ? C.accent : C.border}`,
                        padding: "3px 8px",
                        fontWeight: 600,
                        fontSize: "0.7rem"
                      }}
                    >
                      {category}
                    </button>
                  ))}
                </div>

                {itemsLoading ? (
                  <div style={{ textAlign: "center", color: C.mute, padding: "40px" }}>Loading shop...</div>
                ) : itemsError ? (
                  <div style={{ textAlign: "center", color: C.red, padding: "40px" }}>
                    <div style={{ marginBottom: "10px" }}>{itemsError}</div>
                    <button style={btn("ghost")} onClick={fetchItems}>Retry</button>
                  </div>
                ) : filteredItems.length === 0 ? (
                  <div style={{ textAlign: "center", color: C.mute, padding: "40px" }}>No items found.</div>
                ) : shopLayout === "grid" ? (
                  <div className="shop-grid">
                    {filteredItems.map((item) => (
                      <div key={item.id} className={`shop-card ${cart[item.id] ? "in-cart" : ""}`}>
                        <div className="card-icon"><ItemIcon icon={item.icon} size={42} /></div>
                        <div className="card-name">{item.name}</div>
                        <div className="card-cat">{item.category}</div>
                        <div className="card-desc">{item.desc || " "}</div>
                        <div className="card-price">{item.price.toLocaleString()} <span>{currency}</span></div>
                        <div className="card-action">
                          {cart[item.id] ? (
                            <QtyControls id={item.id} cart={cart} setCart={setCart} addToCart={addToCart} decCart={decCart} removeFromCart={removeFromCart} />
                          ) : (
                            <button style={{ ...btn("primary"), width: "100%", padding: "5px", fontSize: "0.75rem" }} onClick={() => addToCart(item.id)}>
                              Add to Cart
                            </button>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>
                ) : (
                  <div style={{ display: "flex", flexDirection: "column", gap: "4px" }}>
                    {filteredItems.map((item) => (
                      <div key={item.id} className={`list-row ${cart[item.id] ? "in-cart" : ""}`}>
                        <ItemIcon icon={item.icon} size={32} />
                        <div style={{ minWidth: 0 }}>
                          <div className="list-name">{item.name}</div>
                          <div className="list-cat">{item.category}</div>
                        </div>
                        <div className="list-price">{item.price.toLocaleString()} <span style={{ fontSize: "0.55rem" }}>{currency}</span></div>
                        <div className="list-qty">
                          {cart[item.id] ? (
                            <QtyControls id={item.id} cart={cart} setCart={setCart} addToCart={addToCart} decCart={decCart} removeFromCart={removeFromCart} />
                          ) : (
                            <button style={{ ...btn("primary"), padding: "2px 7px", fontSize: "0.7rem" }} onClick={() => addToCart(item.id)}>Add</button>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {view === "cart" && (
              <div style={sectionStyle}>
                <div style={sectionTitleStyle}>Your Cart</div>
                {cartEntries.length === 0 ? (
                  <div style={{ textAlign: "center", color: C.mute, padding: "30px" }}>
                    <div style={{ fontSize: "2rem", marginBottom: "8px" }}>Cart</div>
                    <div>Cart is empty.</div>
                    <button style={btn("ghost")} onClick={() => setView("shop")}>Browse</button>
                  </div>
                ) : (
                  <div>
                    {cartEntries.map((item) => (
                      <div
                        key={item.id}
                        style={{
                          display: "grid",
                          gridTemplateColumns: isMobile ? "1fr" : "minmax(0,1fr) auto",
                          gap: "8px 14px",
                          alignItems: "start",
                          padding: "10px 0",
                          borderBottom: `1px solid ${C.border}`
                        }}
                      >
                        <div style={{ display: "flex", alignItems: "center", gap: "10px", minWidth: 0 }}>
                          <ItemIcon icon={item.icon} size={34} />
                          <span style={{ fontSize: "0.9rem" }}><strong>{item.name}</strong></span>
                        </div>

                        <div style={{ display: "flex", flexDirection: "column", alignItems: isMobile ? "flex-start" : "flex-end", gap: "6px" }}>
                          <span style={{ color: C.accent, fontWeight: 700, fontSize: "0.9rem", whiteSpace: "nowrap" }}>
                            {(item.price * item.qty).toLocaleString()} {currency}
                          </span>
                          <QtyControls id={item.id} cart={cart} setCart={setCart} addToCart={addToCart} decCart={decCart} removeFromCart={removeFromCart} />
                        </div>
                      </div>
                    ))}

                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", paddingTop: "10px", gap: "8px", flexWrap: "wrap" }}>
                      <span style={{ fontFamily: "'Cinzel', serif" }}>TOTAL</span>
                      <TotalAmount amount={cartTotal} isMobile={isMobile} currency={currency} />
                    </div>

                    <div style={{ display: "flex", gap: "6px", marginTop: "12px" }}>
                      <button style={btn("danger")} onClick={clearCart}>Clear</button>
                      <button style={btn("primary")} onClick={() => setView("checkout")}>Checkout</button>
                    </div>
                  </div>
                )}
              </div>
            )}

            {view === "checkout" && (
              <div>
                {cartEntries.length === 0 ? (
                  <div style={sectionStyle}>
                    <div style={{ textAlign: "center", color: C.mute, padding: "30px" }}>
                      <div style={{ fontSize: "2rem", marginBottom: "8px" }}>Order</div>
                      <div>Cart empty.</div>
                      <button style={btn("ghost")} onClick={() => setView("shop")}>Browse</button>
                    </div>
                  </div>
                ) : (
                  <div>
                    <div style={sectionStyle}>
                      <div style={sectionTitleStyle}>Details</div>
                      <div style={{ display: "grid", gap: "10px" }}>
                        <div>
                          <label style={{ ...labelStyle, color: submittedOnce && !characterName.trim() ? C.red : C.dim }}>
                            {submittedOnce && !characterName.trim() ? "Please Enter In-game Character's Name *" : "In-game Character's Name *"}
                          </label>
                          <input style={{ ...inputStyle, borderColor: submittedOnce && !characterName.trim() ? C.red : C.border }} value={characterName} onChange={(e) => setCharacterName(e.target.value)} />
                        </div>
                        <div>
                          <label style={{ ...labelStyle, color: submittedOnce && !psnUsername.trim() ? C.red : C.dim }}>
                            {submittedOnce && !psnUsername.trim() ? "Please Enter PSN Username *" : "PSN Username *"}
                          </label>
                          <input style={{ ...inputStyle, borderColor: submittedOnce && !psnUsername.trim() ? C.red : C.border }} value={psnUsername} onChange={(e) => setPsnUsername(e.target.value)} />
                        </div>
                        <div>
                          <label style={{ ...labelStyle, color: submittedOnce && !discordUsername.trim() ? C.red : C.dim }}>
                            {submittedOnce && !discordUsername.trim() ? "Please Enter Discord Username *" : "Discord Username *"}
                          </label>
                          <input style={{ ...inputStyle, borderColor: submittedOnce && !discordUsername.trim() ? C.red : C.border }} value={discordUsername} onChange={(e) => setDiscordUsername(e.target.value)} />
                        </div>
                      </div>
                    </div>

                    <div style={sectionStyle}>
                      <div style={sectionTitleStyle}>Summary</div>
                      {cartEntries.map((item) => (
                        <div key={item.id} style={{ display: "grid", gridTemplateColumns: "minmax(0,1fr) 70px auto", gap: "8px", padding: "8px 0", borderBottom: `1px solid ${C.border}`, alignItems: "center" }}>
                          <span>{item.name}</span>
                          <span style={{ color: C.dim, textAlign: "right" }}>x{item.qty}</span>
                          <span style={{ color: C.accent, fontWeight: 700 }}>{(item.price * item.qty).toLocaleString()} {currency}</span>
                        </div>
                      ))}
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", paddingTop: "8px", gap: "8px", flexWrap: "wrap" }}>
                        <span style={{ fontFamily: "'Cinzel', serif" }}>TOTAL</span>
                        <TotalAmount amount={cartTotal} isMobile={isMobile} currency={currency} />
                      </div>
                    </div>

                    {!orderLink ? (
                      <button style={{ ...btn("primary"), padding: "7px 18px" }} onClick={generateOrder} disabled={orderLoading}>
                        {orderLoading ? "Saving..." : "Generate Link"}
                      </button>
                    ) : (
                      <div style={sectionStyle}>
                        <div style={sectionTitleStyle}>Ready!</div>
                        <div style={{ background: C.white, border: `1px solid ${C.accent}`, padding: "8px", fontSize: "0.75rem", fontFamily: "monospace", wordBreak: "break-all" }}>
                          {orderLink}
                        </div>
                        <div style={{ display: "flex", gap: "6px", marginTop: "8px" }}>
                          <button style={btn(copied ? "secondary" : "primary")} onClick={copyLink}>{copied ? "Copied" : "Copy"}</button>
                          <button
                            style={btn("ghost")}
                            onClick={() => {
                              setOrderLink("");
                              setCharacterName("");
                              setPsnUsername("");
                              setDiscordUsername("");
                              setSubmittedOnce(false);
                              setCart({});
                              setView("shop");
                            }}
                          >
                            New
                          </button>
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}

            {view === "admin" && (
              <div>
                {!adminUnlocked ? (
                  <div style={{ ...sectionStyle, maxWidth: "320px" }}>
                    <div style={sectionTitleStyle}>Admin</div>
                    <label style={labelStyle}>Password</label>
                    <input
                      type="password"
                      style={{ ...inputStyle, marginBottom: "6px" }}
                      value={passInput}
                      onChange={(e) => setPassInput(e.target.value)}
                      onKeyDown={(e) => e.key === "Enter" && adminLogin()}
                    />
                    {passError && <div style={{ color: C.red, marginBottom: "6px", fontSize: "0.75rem" }}>{passError}</div>}
                    <button style={btn("primary")} onClick={adminLogin} disabled={passLoading}>{passLoading ? "..." : "🔓 Unlock"}</button>
                  </div>
                ) : (
                  <div>
                    <div style={{ display: "flex", gap: "4px", marginBottom: "12px", flexWrap: "wrap" }}>
                      {[
                        ["items", "\u{1F4E6} Items"],
                        ["calc", "\u{1F9EE} Calc"],
                        ["settings", "\u2699\uFE0F Settings"]
                      ].map(([id, label]) => (
                        <button key={id} style={{ ...btn(adminTab === id ? "primary" : "secondary"), padding: "4px 8px", fontSize: "0.75rem" }} onClick={() => setAdminTab(id)}>
                          {label}
                        </button>
                      ))}
                      <button style={{ ...btn("secondary"), marginLeft: "auto", padding: "4px 8px", fontSize: "0.75rem" }} onClick={() => { sessionStorage.removeItem("ark_admin"); setAdminUnlocked(false); }}>
                        🔒 Lock
                      </button>
                    </div>

                    {adminTab === "items" && (
                      <div style={sectionStyle}>
                        <div style={{ ...sectionTitleStyle, display: "flex", justifyContent: "space-between", alignItems: "center", gap: "8px", flexWrap: "wrap" }}>
                          <span>Items: {items.length}</span>
                          <span style={{ color: saveStatus.type === "error" ? C.red : saveStatus.type === "saved" ? C.green : C.dim, fontSize: "0.72rem" }}>
                            {itemsSaving ? "Saving to Cloudflare..." : saveStatus.message || "Ready"}
                          </span>
                        </div>

                        <DraftEditor draft={newItem} setDraft={setNewItem} formula={newItemFormula} isMobile={isMobile} currency={currency} materialTiers={materialTiers} allMaterials={allMaterials} />

                        <div style={{ display: "flex", gap: "6px", marginTop: "10px", marginBottom: "12px", flexWrap: "wrap" }}>
                          <button style={btn("primary")} onClick={addItem} disabled={itemsSaving}>Add Item</button>
                          <button style={btn("secondary")} onClick={() => setNewItem(emptyItemDraft())} disabled={itemsSaving}>Clear</button>
                        </div>

                        {adminFilteredItems.map((item) => (
                          <div key={item.id} style={{ padding: "10px 0", borderBottom: `1px solid ${C.border}` }}>
                            {editItem?.id === item.id ? (
                              <div style={{ display: "grid", gap: "10px" }}>
                                <DraftEditor draft={editItem} setDraft={setEditItem} formula={editItemFormula} isEditing isMobile={isMobile} currency={currency} materialTiers={materialTiers} allMaterials={allMaterials} />
                                <div style={{ display: "flex", gap: "6px", flexWrap: "wrap" }}>
                                  <button style={btn("primary")} onClick={saveEdit} disabled={itemsSaving}>Save</button>
                                  <button style={btn("secondary")} onClick={() => setEditItem(null)} disabled={itemsSaving}>Cancel</button>
                                </div>
                              </div>
                            ) : (
                              <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "42px minmax(0,1fr) auto auto", gap: "8px", alignItems: "center" }}>
                                <ItemIcon icon={item.icon} size={34} />
                                <div style={{ minWidth: 0 }}>
                                  <div style={{ fontSize: "0.9rem" }}><strong>{item.name}</strong></div>
                                  <div style={{ color: C.mute, fontSize: "0.74rem" }}>{item.category} - {item.fixed ? "Fixed" : `Formula - Lvl ${item.engram}`}</div>
                                  {item.desc ? <div style={{ color: C.dim, fontSize: "0.74rem" }}>{item.desc}</div> : null}
                                </div>
                                <div style={{ color: C.accent, fontWeight: 700, fontSize: "0.85rem", whiteSpace: "nowrap" }}>{item.price} {currency}</div>
                                <div style={{ display: "flex", gap: "4px", flexWrap: "wrap" }}>
                                  <button style={{ ...btn("secondary"), padding: "2px 6px", fontSize: "0.7rem" }} onClick={() => setEditItem(toEditableItem(item))} disabled={itemsSaving}>Edit</button>
                                  <button style={{ ...btn("danger"), padding: "2px 6px", fontSize: "0.7rem" }} onClick={() => deleteItem(item.id)} disabled={itemsSaving}>Del</button>
                                </div>
                              </div>
                            )}
                          </div>
                        ))}
                      </div>
                    )}

                    {adminTab === "calc" && (
                      <div style={sectionStyle}>
                        <div style={sectionTitleStyle}>Calculator</div>
                        <div style={{ display: "flex", gap: "6px", flexWrap: "wrap", marginBottom: "10px" }}>
                          <button style={btn(calcDraft.fixed ? "secondary" : "primary")} onClick={() => setCalcDraft((current) => ({ ...current, fixed: false }))}>Formula</button>
                          <button style={btn(calcDraft.fixed ? "primary" : "secondary")} onClick={() => setCalcDraft((current) => ({ ...current, fixed: true }))}>Fixed</button>
                        </div>
                        {calcDraft.fixed ? (
                          <div style={{ maxWidth: "200px", marginBottom: "10px" }}>
                            <label style={labelStyle}>Price</label>
                            <input type="number" min="0" style={inputStyle} value={calcDraft.price} onChange={(e) => updateDraft(setCalcDraft, "price", e.target.value)} />
                          </div>
                        ) : (
                          <div style={{ display: "grid", gap: "8px", marginBottom: "10px" }}>
                            <div style={{ maxWidth: "200px" }}>
                              <label style={labelStyle}>Engram Level</label>
                              <input type="number" min="0" style={inputStyle} value={calcDraft.engram} onChange={(e) => updateDraft(setCalcDraft, "engram", e.target.value)} />
                            </div>
                            <div>
                              <label style={labelStyle}>Recipe</label>
                              <RecipeEditor recipe={calcDraft.recipe} onChange={(value) => updateDraftRecipe(setCalcDraft, value)} allMaterials={allMaterials} />
                            </div>
                          </div>
                        )}
                        <DraftPricing draft={calcDraft} formula={calcFormula} currency={currency} materialTiers={materialTiers} />
                      </div>
                    )}

                    {adminTab === "settings" && (
                      <div style={sectionStyle}>
                        <div style={sectionTitleStyle}>Settings</div>
                        
                        <div style={{ marginBottom: "20px" }}>
                          <label style={labelStyle}>Currency Name</label>
                          <input style={{ ...inputStyle, maxWidth: "240px" }} value={editCurrency} onChange={(e) => setEditCurrency(e.target.value)} />
                        </div>

                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: "20px", marginBottom: "8px" }}>
                          <div style={{ ...sectionTitleStyle, fontSize: "1rem", marginBottom: 0 }}>Materials & Costs (in Metal Ingots)</div>
                        </div>

                        <div style={{ ...sectionStyle, background: C.bg3, border: `2px solid ${C.accent}`, marginBottom: "16px" }}>
                          <div style={{ fontWeight: 800, fontSize: "0.9rem", marginBottom: "8px", color: C.accentDark }}>Add Material</div>
                          <div style={{ display: "grid", gridTemplateColumns: "1fr 100px auto", gap: "8px" }}>
                            <input id="new-mat-name-box" placeholder="Name (e.g. Gunpowder)" style={inputStyle} />
                            <input id="new-mat-cost-box" type="number" step="any" placeholder="Cost" style={inputStyle} />
                            <button 
                              style={btn("primary")}
                              onClick={() => {
                                const nameInput = document.getElementById("new-mat-name-box");
                                const costInput = document.getElementById("new-mat-cost-box");
                                const name = nameInput.value.trim();
                                const cost = parseFloat(costInput.value) || 0;
                                if (name) {
                                  setEditMaterials(prev => ({ ...prev, [name]: cost }));
                                  nameInput.value = ""; costInput.value = "";
                                }
                              }}
                            >
                              Add
                            </button>
                          </div>
                        </div>

                        {showImport && (
                          <div style={{ marginBottom: "12px", background: "#f0f4f4", padding: "10px", border: `1px solid ${C.border}` }}>
                            <label style={{ ...labelStyle, marginBottom: "4px" }}>Paste Materials JSON here:</label>
                            <textarea 
                              style={{ ...inputStyle, height: "80px", fontFamily: "monospace", fontSize: "0.75rem", marginBottom: "8px" }}
                              value={importText}
                              onChange={(e) => setImportText(e.target.value)}
                              placeholder='{ "Wood": 0.05, ... }'
                            />
                            <div style={{ display: "flex", gap: "6px" }}>
                              <button style={{ ...btn("primary"), padding: "4px 12px", fontSize: "0.75rem" }} onClick={() => { importMaterials(importText); setShowImport(false); setImportText(""); }}>Apply Import</button>
                              <button style={{ ...btn("secondary"), padding: "4px 12px", fontSize: "0.75rem" }} onClick={() => setShowImport(false)}>Cancel</button>
                            </div>
                          </div>
                        )}

                        <div style={{ 
                          display: "grid", 
                          gap: "8px", 
                          maxHeight: "300px", 
                          overflowY: "auto", 
                          paddingRight: "8px",
                          border: `1px solid ${C.border}`,
                          padding: "8px",
                          background: "#fdfdfd",
                          marginBottom: "16px"
                        }}>
                          {Object.keys(editMaterials).sort().map((mat) => (
                            <div key={mat} style={{ display: "grid", gridTemplateColumns: "1fr 100px 40px", gap: "8px", alignItems: "center" }}>
                              <div style={{ fontSize: "0.85rem", fontWeight: 600 }}>{mat}</div>
                              <input 
                                type="number" 
                                step="any"
                                style={inputStyle} 
                                value={editMaterials[mat]} 
                                onChange={(e) => {
                                  const val = parseFloat(e.target.value) || 0;
                                  setEditMaterials(prev => ({ ...prev, [mat]: val }));
                                }} 
                              />
                              <button 
                                style={{ ...btn("danger"), padding: "4px" }} 
                                onClick={() => {
                                  if (confirm(`Delete material "${mat}"?`)) {
                                    const next = { ...editMaterials };
                                    delete next[mat];
                                    setEditMaterials(next);
                                  }
                                }}
                              >
                                X
                              </button>
                            </div>
                          ))}
                        </div>

                        <div style={{ marginTop: "24px", borderTop: `2px solid ${C.border}`, paddingTop: "16px" }}>
                          <button style={btn("primary")} onClick={saveSettings}>Save All Settings</button>
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
