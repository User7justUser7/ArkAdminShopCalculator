<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>247 Always Online — Admin Shop</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #e9ebe9; font-family: 'Rajdhani', sans-serif; }
  button { cursor: pointer; font-family: 'Rajdhani', sans-serif; }
  .qty-input { width: 36px; text-align: center; padding: 2px; font-weight: 700; border: 1px solid #88a8b4; background: #f4f8f8; font-size: 0.8rem; }
  .top-bar { background: #1a3a46; padding: 8px 12px; position: sticky; top: 0; z-index: 100; }
  .top-bar-title { font-family: 'Cinzel', serif; font-size: 1rem; color: #d0e1e4; font-weight: 700; }
  .top-bar-subtitle { font-size: 0.5rem; color: #7a9aa4; text-transform: uppercase; letter-spacing: 0.15em; }
  .nav-bar { background: #1a3a46; padding: 6px 12px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 45px; z-index: 99; height: 38px; }
  .nav-buttons { display: flex; gap: 4px; }
  .nav-btn { background: transparent; color: #d0e1e4; border: 1px solid #7a9aa4; padding: 4px 8px; font-size: 0.7rem; font-weight: 600; border-radius: 2px; white-space: nowrap; min-width: 65px; text-align: center; }
  .nav-btn.active { background: #d0e1e4; color: #1a3a46; border-color: #d0e1e4; }
  .nav-btn-cart { min-width: 85px; }
  .admin-btn { background: transparent; color: #7a9aa4; border: 1px solid #4a6a74; padding: 4px 8px; font-size: 0.7rem; border-radius: 2px; }
  .admin-btn.active { background: #ffffff22; color: #d0e1e4; border-color: #d0e1e4; }
  .shop-card { background: #d0e1e4; border: 2px solid #a8c0c8; border-radius: 4px; padding: 10px; display: flex; flex-direction: column; height: 285px; }
  .shop-card.in-cart { border-color: #2a5a6a; }
  .card-icon { height: 40px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; flex-shrink: 0; }
  .card-name { height: 34px; font-family: 'Cinzel', serif; font-size: 0.72rem; font-weight: 700; color: #1a3a46; margin-top: 4px; overflow: hidden; flex-shrink: 0; }
  .card-cat { height: 13px; font-size: 0.6rem; color: #7a9aa4; text-transform: uppercase; flex-shrink: 0; overflow: hidden; white-space: nowrap; }
  .card-desc { height: 26px; font-size: 0.68rem; color: #4a6a74; margin-top: 3px; overflow: hidden; flex-shrink: 0; }
  .card-price { height: 22px; display: flex; align-items: center; font-size: 0.9rem; color: #2a5a6a; font-weight: 700; margin-top: 4px; flex-shrink: 0; }
  .card-price span { font-size: 0.6rem; color: #4a6a74; margin-left: 2px; }
  .card-action { margin-top: auto; padding-top: 6px; flex-shrink: 0; height: 34px; }
  .shop-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
  .list-row { display: grid; grid-template-columns: 28px 1fr 75px; gap: 4px; align-items: center; padding: 4px 6px; background: #d0e1e4; border: 1px solid #a8c0c8; border-radius: 2px; height: 42px; }
  .list-row.in-cart { background: #c0d4d8; border-color: #2a5a6a; }
  .list-name { font-family: 'Cinzel', serif; font-size: 0.72rem; color: #1a3a46; font-weight: 700; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .list-cat { font-size: 0.58rem; color: #7a9aa4; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .list-price { text-align: right; color: #2a5a6a; font-weight: 700; font-size: 0.75rem; white-space: nowrap; }
  .list-qty { display: flex; justify-content: flex-end; }
  @media (min-width: 601px) {
    .top-bar { padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; height: 50px; }
    .top-bar-title { font-size: 1.3rem; }
    .top-bar-subtitle { font-size: 0.55rem; }
    .nav-bar { top: 50px; height: 44px; padding: 8px 16px; }
    .nav-btn { padding: 5px 12px; font-size: 0.8rem; min-width: 80px; }
    .nav-btn-cart { min-width: 100px; }
    .admin-btn { padding: 5px 12px; font-size: 0.8rem; }
    .shop-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }
    .shop-card { height: 310px; padding: 12px; }
    .card-icon { height: 44px; font-size: 2rem; }
    .card-name { height: 38px; font-size: 0.78rem; }
    .card-desc { height: 28px; font-size: 0.72rem; }
    .card-price { font-size: 0.95rem; }
    .card-action { height: 38px; }
    .list-row { grid-template-columns: 32px 1fr 85px 130px; height: 52px; padding: 6px 8px; }
    .list-name { font-size: 0.78rem; }
    .list-cat { font-size: 0.62rem; }
    .list-price { font-size: 0.82rem; }
  }
</style>
</head>

  { id:'s10',name:'Fabricator', category:'Structures', icon:'⚙️', price:960, fixed:false, engram:55, recipe:[{material:'Metal Ingot',qty:35},{material:'Polymer',qty:20},{material:'Electronics',qty:15},{material:'Crystal',qty:5},{material:'Cementing Paste',qty:20}] },
  { id:'s11',name:'Industrial Forge', category:'Structures', icon:'🔥', price:1320, fixed:false, engram:80, recipe:[{material:'Metal Ingot',qty:100},{material:'Electronics',qty:50},{material:'Gasoline',qty:80}] },
  { id:'sd1',name:'Rex Saddle', category:'Saddles', icon:'🦕', price:710, fixed:false, engram:74, recipe:[{material:'Hide',qty:550},{material:'Fiber',qty:130},{material:'Metal Ingot',qty:100}] },
  { id:'sd2',name:'Argentavis Saddle', category:'Saddles', icon:'🦅', price:578, fixed:false, engram:62, recipe:[{material:'Hide',qty:450},{material:'Fiber',qty:100},{material:'Metal Ingot',qty:80}] },
  { id:'sd3',name:'Raptor Saddle', category:'Saddles', icon:'🦖', price:100, fixed:false, engram:18, recipe:[{material:'Hide',qty:100},{material:'Fiber',qty:30},{material:'Wood',qty:50}] },
  { id:'sd4',name:'Quetzal Saddle', category:'Saddles', icon:'🦕', price:758, fixed:false, engram:86, recipe:[{material:'Hide',qty:500},{material:'Fiber',qty:200},{material:'Metal Ingot',qty:120},{material:'Crystal',qty:50}] },
  { id:'bp1',name:'Assault Rifle BP', category:'Blueprints', icon:'📋', price:980, fixed:false, engram:65, recipe:[{material:'Metal Ingot',qty:125},{material:'Polymer',qty:50},{material:'Crystal',qty:15},{material:'Electronics',qty:10}] },
  { id:'bp2',name:'Flak Chestpiece BP', category:'Blueprints', icon:'📋', price:614, fixed:false, engram:46, recipe:[{material:'Metal Ingot',qty:250},{material:'Hide',qty:120},{material:'Fiber',qty:30}] },
  { id:'bp3',name:'Fabricated Sniper BP', category:'Blueprints', icon:'📋', price:1190, fixed:false, engram:85, recipe:[{material:'Metal Ingot',qty:150},{material:'Polymer',qty:60},{material:'Crystal',qty:20},{material:'Electronics',qty:15}] },
];

function getOrderIdFromHash() {
  const h = window.location.hash;
  if (!h.startsWith('#order=')) return null;
  return h.slice(7);
}

function App() {
  const [items, setItems] = useState(function() {
    try {
      const s = localStorage.getItem('ark_items');
      return s ? JSON.parse(s) : DEFAULT_ITEMS;
    } catch(e) {
      return DEFAULT_ITEMS;
    }
  });
  
  const [shopName] = useState('247 Always Online');
  const [currency, setCurrency] = useState(function() {
    return localStorage.getItem('ark_currency') || 'Iron Ingots';
  });
  
  useEffect(function() {
    localStorage.setItem('ark_items', JSON.stringify(items));
  }, [items]);
  
  useEffect(function() {
    localStorage.setItem('ark_currency', currency);
  }, [currency]);

  const [view, setView] = useState('shop');
  const [shopLayout, setShopLayout] = useState('grid');
  const [catFilter, setCatFilter] = useState('All');
  const [searchQ, setSearchQ] = useState('');
  const [cart, setCart] = useState({});
  const [playerName, setPlayerName] = useState('');
  const [discord, setDiscord] = useState('');
  const [orderLink, setOrderLink] = useState('');
  const [copied, setCopied] = useState(false);
  const [orderView, setOrderView] = useState(null);
  const [orderLoading, setOrderLoading] = useState(false);
  const [adminUnlocked, setAdminUnlocked] = useState(function() {
    return sessionStorage.getItem('ark_admin') === 'yes';
  });
  const [passInput, setPassInput] = useState('');
  const [passError, setPassError] = useState('');
  const [passLoading, setPassLoading] = useState(false);
  const [adminTab, setAdminTab] = useState('items');
  const [editItem, setEditItem] = useState(null);
  const [editCurrency, setEditCurrency] = useState(currency);
  const [calcRecipe, setCalcRecipe] = useState([{material:'Metal Ingot',qty:''}]);
  const [calcEngram, setCalcEngram] = useState('');
  const [calcFixed, setCalcFixed] = useState(false);
  const [calcFixedP, setCalcFixedP] = useState('');
  const [calcResult, setCalcResult] = useState(null);
  const [calcName, setCalcName] = useState('');
  const [calcCat, setCalcCat] = useState('Weapons');
  const [calcIcon, setCalcIcon] = useState('📦');
  const [calcDesc, setCalcDesc] = useState('');
  const [isMobile, setIsMobile] = useState(window.innerWidth <= 600);

  useEffect(function() {
    function handleResize() {
      setIsMobile(window.innerWidth <= 600);
    }
    window.addEventListener('resize', handleResize);
    return function() {
      window.removeEventListener('resize', handleResize);
    };
  }, []);

  useEffect(function() {
    const orderId = getOrderIdFromHash();
    if (orderId) {
      setView('order');
      fetch('/get-order?id=' + orderId)
        .then(function(r) { return r.json(); })
        .then(function(data) { setOrderView(data); })
        .catch(function() { setOrderView({ error: true }); });
    }
  }, []);

  function addToCart(id) {
    setCart(function(c) {
      var next = {};
      for (var k in c) next[k] = c[k];
      next[id] = (next[id] || 0) + 1;
      return next;
    });
  }
  
  function decCart(id) {
    setCart(function(c) {
      var next = {};
      for (var k in c) next[k] = c[k];
      if (next[id] > 1) {
        next[id]--;
      } else {
        delete next[id];
      }
      return next;
    });
  }
  
  function removeFromCart(id) {
    setCart(function(c) {
      var next = {};
      for (var k in c) next[k] = c[k];
      delete next[id];
      return next;
    });
  }
  
  function clearCart() {
    if (confirm('Clear cart?')) setCart({});
  }

  var cartEntries = [];
  Object.entries(cart).forEach(function(entry) {
    var id = entry[0];
    var qty = entry[1];
    var it = items.find(function(i) { return i.id === id; });
    if (it) cartEntries.push(Object.assign({}, it, {qty: qty}));
  });
  
  var cartTotal = cartEntries.reduce(function(s, i) { return s + i.price * i.qty; }, 0);
  var cartCount = Object.values(cart).reduce(function(a, b) { return a + b; }, 0);
  
  var categories = ['All'];
  items.forEach(function(i) {
    if (categories.indexOf(i.category) === -1) categories.push(i.category);
  });
  
  var filtered = items.filter(function(i) {
    return (catFilter === 'All' || i.category === catFilter) &&
           i.name.toLowerCase().indexOf(searchQ.toLowerCase()) !== -1;
  });

  function generateOrder() {
    if (!playerName.trim()) {
      alert('Enter player name!');
      return;
    }
    setOrderLoading(true);
    fetch('/save-order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        player: playerName.trim(),
        discord: discord.trim(),
        timestamp: new Date().toISOString(),
        items: cartEntries.map(function(i) { return { id: i.id, qty: i.qty }; })
      })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      setOrderLink(window.location.href.split('#')[0] + '#order=' + data.id);
    })
    .catch(function() {
      alert('Failed to save order.');
    })
    .finally(function() {
      setOrderLoading(false);
    });
  }

  function copyLink() {
    navigator.clipboard.writeText(orderLink).then(function() {
      setCopied(true);
      setTimeout(function() { setCopied(false); }, 2500);
    });
  }

  function adminLogin() {
    setPassLoading(true);
    setPassError('');
    fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: passInput })
    })
    .then(function(r) {
      if (r.ok) {
        sessionStorage.setItem('ark_admin', 'yes');
        setAdminUnlocked(true);
        setPassInput('');
      } else {
        setPassError('Incorrect password.');
      }
    })
    .catch(function() {
      setPassError('Connection failed.');
    })
    .finally(function() {
      setPassLoading(false);
    });
  }

  function deleteItem(id) {
    if (confirm('Remove?')) {
      setItems(function(p) { return p.filter(function(i) { return i.id !== id; }); });
    }
  }
  
  function saveEdit() {
    if (!editItem) return;
    setItems(function(p) {
      return p.map(function(i) {
        if (i.id === editItem.id) {
          return Object.assign({}, editItem, { price: Number(editItem.price) });
        }
        return i;
      });
    });
    setEditItem(null);
  }
  
  function saveSettings() {
    setCurrency(editCurrency);
    alert('Saved!');
  }
  
  function resetToDefault() {
    if (confirm('Reset all?')) {
      setItems(DEFAULT_ITEMS);
      localStorage.removeItem('ark_items');
    }
  }
  
  function exportItems() {
    var blob = new Blob([JSON.stringify(items, null, 2)], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'shop-items.json';
    a.click();
    URL.revokeObjectURL(url);
  }

  function runCalc() {
    if (calcFixed) {
      setCalcResult({ price: parseInt(calcFixedP) || 0, fixed: true });
      return;
    }
    var materialIron = calcRecipe.reduce(function(sum, row) {
      var rate = MATERIAL_TIERS[row.material];
      if (!rate || !row.qty) return sum;
      return sum + parseFloat(row.qty) * rate;
    }, 0);
    var e = parseFloat(calcEngram) || 0;
    var usedEngram = e <= materialIron;
    setCalcResult({
      price: Math.round(usedEngram ? (materialIron + e) * 2 : materialIron * 2),
      materialIron: Math.round(materialIron * 100) / 100,
      engram: e,
      usedEngram: usedEngram,
      fixed: false
    });
  }

  function addCalcItem() {
    if (!calcName || !calcResult) {
      alert('Enter name and calculate first.');
      return;
    }
    var price = calcFixed ? parseInt(calcFixedP) : calcResult.price;
    var newItem = {
      id: Date.now().toString(),
      name: calcName,
      category: calcCat,
      icon: calcIcon,
      desc: calcDesc,
      price: price,
