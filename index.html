{view==='shop'&&<div><div style={{display:'flex',gap:'6px',marginBottom:'8px',flexWrap:'wrap'}}><input style={{...inp,flex:'1 1 140px'}} placeholder="🔍 Search..." value={searchQ} onChange={e=>setSearchQ(e.target.value)}/><button onClick={()=>setShopLayout('grid')} style={{...btn(shopLayout==='grid'?'primary':'secondary'),padding:'4px 8px',fontSize:'0.85rem'}}>⊞</button><button onClick={()=>setShopLayout('list')} style={{...btn(shopLayout==='list'?'primary':'secondary'),padding:'4px 8px',fontSize:'0.85rem'}}>☰</button></div><div style={{display:'flex',gap:'3px',flexWrap:'wrap',marginBottom:'10px'}}>{categories.map(cat=><button key={cat} onClick={()=>setCatFilter(cat)} style={{background:catFilter===cat?C.accent:'transparent',color:catFilter===cat?C.white:C.dim,border:`1px solid ${catFilter===cat?C.accent:C.border}`,padding:'3px 8px',fontWeight:600,fontSize:'0.7rem'}}>{cat}</button>)}</div>{itemsLoading?<div style={{textAlign:'center',color:C.mute,padding:'40px'}}>Loading shop...</div>:itemsError?<div style={{textAlign:'center',color:C.red,padding:'40px'}}><div style={{marginBottom:'10px'}}>{itemsError}</div><button style={btn('ghost')} onClick={fetchItems}>Retry</button></div>:filtered.length===0?<div style={{textAlign:'center',color:C.mute,padding:'40px'}}>No items found.</div>:shopLayout==='grid'?<div className="shop-grid">{filtered.map(item=><div key={item.id} className={`shop-card${cart[item.id]?' in-cart':''}`}><div className="card-icon">{item.icon}</div><div className="card-name">{item.name}</div><div className="card-cat">{item.category}</div><div className="card-desc">{item.desc||' '}</div><div className="card-price">{item.price.toLocaleString()} <span>{currency}</span></div><div className="card-action">{cart[item.id]?<QtyControls id={item.id}/>:<button style={{...btn('primary'),width:'100%',padding:'5px',fontSize:'0.75rem'}} onClick={()=>addToCart(item.id)}>Add to Cart</button>}</div></div>)}</div>:<div style={{display:'flex',flexDirection:'column',gap:'4px'}}>{filtered.map(item=><div key={item.id} className={`list-row${cart[item.id]?' in-cart':''}`}><span style={{fontSize:'1rem'}}>{item.icon}</span><div style={{minWidth:0}}><div className="list-name">{item.name}</div><div className="list-cat">{item.category}</div></div><div className="list-price">{item.price.toLocaleString()} <span style={{fontSize:'0.55rem'}}>{currency}</span></div><div className="list-qty">{cart[item.id]?<QtyControls id={item.id}/>:<button style={{...btn('primary'),padding:'2px 7px',fontSize:'0.7rem'}} onClick={()=>addToCart(item.id)}>Add</button>}</div></div>)}</div>}</div>}
{view==='cart'&&<div style={sec}>{cartEntries.length===0?<div style={{textAlign:'center',color:C.mute,padding:'30px'}}><div style={{fontSize:'2rem',marginBottom:'8px'}}>🛒</div><div>Cart is empty.</div><button style={btn('ghost')} onClick={()=>setView('shop')}>Browse →</button></div>:<div><div style={stl}>🧺 Your Cart</div>{cartEntries.map(item=><div key={item.id} style={{display:'grid',gridTemplateColumns:'minmax(0,1fr) auto',gap:'6px 14px',alignItems:'start',padding:'10px 0',borderBottom:`1px solid ${C.border}`}}><span style={{minWidth:0,fontSize:'0.9rem'}}>{item.icon} <strong>{item.name}</strong></span><div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:'6px'}}><span style={{color:C.accent,fontWeight:700,fontSize:'0.9rem',whiteSpace:'nowrap'}}>{(item.price*item.qty).toLocaleString()} {currency}</span><QtyControls id={item.id}/></div></div>)}<div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',paddingTop:'10px',gap:'8px',flexWrap:'wrap'}}><span style={{fontFamily:"'Cinzel',serif"}}>TOTAL</span><TotalAmount amount={cartTotal}/></div><div style={{display:'flex',gap:'6px',marginTop:'12px'}}><button style={btn('danger')} onClick={clearCart}>Clear</button><button style={btn('primary')} onClick={()=>setView('checkout')}>Checkout →</button></div></div>}</div>}
{view==='checkout'&&(
<div>{cartEntries.length===0?<div style={sec}><div style={{textAlign:'center',color:C.mute,padding:'30px'}}><div style={{fontSize:'2rem',marginBottom:'8px'}}>📋</div><div>Cart empty.</div><button style={btn('ghost')} onClick={()=>setView('shop')}>Browse →</button></div></div>:<div><div style={sec}><div style={stl}>Details</div><div style={{display:'grid',gap:'10px'}}><div><label style={lbl}>In-game Character's Name *</label><input style={inp} value={characterName} onChange={e=>setCharacterName(e.target.value)}/></div><div><label style={lbl}>PSN Username *</label><input style={inp} value={psnUsername} onChange={e=>setPsnUsername(e.target.value)}/></div><div><label style={lbl}>Discord Username *</label><input style={inp} value={discordUsername} onChange={e=>setDiscordUsername(e.target.value)}/></div></div></div><div style={sec}><div style={stl}>Summary</div>{cartEntries.map(item=><div key={item.id} style={row}><span>{item.name}</span><span style={{color:C.dim}}>x{item.qty}</span><span style={{color:C.accent,fontWeight:700}}>{(item.price*item.qty).toLocaleString()} {currency}</span></div>)}<div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',paddingTop:'8px',gap:'8px',flexWrap:'wrap'}}><span style={{fontFamily:"'Cinzel',serif"}}>TOTAL</span><TotalAmount amount={cartTotal}/></div></div>{!orderLink?<button style={{...btn('primary'),padding:'7px 18px'}} onClick={generateOrder} disabled={orderLoading}>{orderLoading?'⏳ Saving...':'✓ Generate Link'}</button>:<div style={sec}><div style={stl}>✅ Ready!</div><div style={{background:C.white,border:`1px solid ${C.accent}`,padding:'8px',fontSize:'0.75rem',fontFamily:'monospace',wordBreak:'break-all'}}>{orderLink}</div><div style={{display:'flex',gap:'6px',marginTop:'8px'}}><button style={btn(copied?'secondary':'primary')} onClick={copyLink}>{copied?'✓ Copied':'📋 Copy'}</button><button style={btn('ghost')} onClick={()=>{setOrderLink('');setCharacterName('');setPsnUsername('');setDiscordUsername('');setCart({});setView('shop')}}>New</button></div></div>}</div>}</div>
)}
{view==='admin'&&(
<div>{!adminUnlocked?<div style={{...sec,maxWidth:'320px'}}><div style={stl}>🔒 Admin</div><label style={lbl}>Password</label><input type="password" style={{...inp,marginBottom:'6px'}} value={passInput} onChange={e=>setPassInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&adminLogin()}/>{passError&&<div style={{color:C.red,marginBottom:'6px',fontSize:'0.75rem'}}>{passError}</div>}<button style={btn('primary')} onClick={adminLogin} disabled={passLoading}>{passLoading?'...':'Unlock'}</button></div>:<div><div style={{display:'flex',gap:'4px',marginBottom:'12px',flexWrap:'wrap'}}>{[['items','📦 Items'],['calc','🧮 Calc'],['settings','⚙️ Settings']].map(([id,label])=><button key={id} style={{...btn(adminTab===id?'primary':'secondary'),padding:'4px 8px',fontSize:'0.75rem'}} onClick={()=>setAdminTab(id)}>{label}</button>)}<button style={{...btn('secondary'),marginLeft:'auto',padding:'4px 8px',fontSize:'0.75rem'}} onClick={()=>{sessionStorage.removeItem('ark_admin');setAdminUnlocked(false)}}>🔒 Lock</button></div>{adminTab==='items'&&<div style={sec}><div style={{...stl,display:'flex',justifyContent:'space-between',alignItems:'center'}}><span>Items: {items.length}</span>{itemsSaving&&<span style={{color:C.dim,fontSize:'0.7rem'}}>Saving...</span>}</div>{itemsLoading?<div style={{color:C.mute}}>Loading items...</div>:itemsError?<div style={{color:C.red}}>{itemsError}</div>:items.map(item=><div key={item.id} style={row}>{editItem?.id===item.id?<div style={{flex:1,display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'4px'}}>{['icon','name','category','price','engram','desc'].map(f=><div key={f}><label style={lbl}>{f}</label><input style={{...inp,padding:'3px',fontSize:'0.8rem'}} value={editItem[f]||''} onChange={e=>setEditItem(ei=>({...ei,[f]:e.target.value}))}/></div>)}<div style={{gridColumn:'1/-1',display:'flex',gap:'3px'}}><button style={btn('primary')} onClick={saveEdit} disabled={itemsSaving}>Save</button><button style={btn('secondary')} onClick={()=>setEditItem(null)} disabled={itemsSaving}>Cancel</button></div></div>:<><span style={{fontSize:'0.9rem'}}>{item.icon} <strong>{item.name}</strong></span><span style={{color:C.mute,fontSize:'0.75rem'}}>- {item.category}</span><span style={{color:C.accent,fontWeight:700,fontSize:'0.85rem'}}>{item.price} {currency}</span><div style={{display:'flex',gap:'3px'}}><button style={{...btn('secondary'),padding:'2px 6px',fontSize:'0.7rem'}} onClick={()=>setEditItem({...item})} disabled={itemsSaving}>Edit</button><button style={{...btn('danger'),padding:'2px 6px',fontSize:'0.7rem'}} onClick={()=>deleteItem(item.id)} disabled={itemsSaving}>Del</button></div></>}</div>)}</div>}{adminTab==='calc'&&<div style={sec}><div style={stl}>🧮 Calculator</div><div style={{display:'flex',gap:'6px',marginBottom:'12px'}}><button style={btn(calcFixed?'secondary':'primary')} onClick={()=>setCalcFixed(false)}>Formula</button><button style={btn(calcFixed?'primary':'secondary')} onClick={()=>setCalcFixed(true)}>Fixed</button></div>{calcFixed?<div style={{marginBottom:'12px'}}><label style={lbl}>Fixed Price</label><input type="number" style={{...inp,maxWidth:'160px'}} value={calcFixedP} onChange={e=>setCalcFixedP(e.target.value)}/></div>:<div style={{marginBottom:'10px'}}><label style={lbl}>Materials</label>{calcRecipe.map((r,i)=><div key={i} style={{display:'flex',gap:'4px',marginBottom:'4px',alignItems:'center'}}><select style={{...sel,flex:1,padding:'3px',fontSize:'0.8rem'}} value={r.material} onChange={e=>{const x=[...calcRecipe];x[i].material=e.target.value;setCalcRecipe(x)}}>{ALL_MATERIALS.map(m=><option key={m}>{m}</option>)}</select><input type="number" style={{...inp,width:'70px',padding:'3px',fontSize:'0.8rem'}} value={r.qty} onChange={e=>{const x=[...calcRecipe];x[i].qty=e.target.value;setCalcRecipe(x)}}/>{calcRecipe.length>1&&<button style={{...btn('danger'),padding:'2px 6px',fontSize:'0.68rem'}} onClick={()=>setCalcRecipe(calcRecipe.filter((_,j)=>j!==i))}>✕</button>}</div>)}<button style={{...btn('ghost'),padding:'3px 8px',fontSize:'0.75rem'}} onClick={()=>setCalcRecipe([...calcRecipe,{material:'Metal Ingot',qty:''}])}>+ Add</button></div>}<div style={{marginBottom:'12px'}}><input type="number" style={{...inp,maxWidth:'120px',padding:'4px'}} placeholder="Engram" value={calcEngram} onChange={e=>setCalcEngram(e.target.value)}/></div><button style={{...btn('primary'),padding:'6px 16px'}} onClick={runCalc}>Calculate</button>{calcResult&&<div style={{marginTop:'14px',background:C.white,border:`1px solid ${C.border}`,padding:'12px'}}><div style={{fontFamily:"'Cinzel',serif",fontSize:'1.6rem',color:C.accent,fontWeight:900}}>{calcResult.price.toLocaleString()} {currency}</div></div>}{calcResult&&<div style={sec}><input style={{...inp,marginBottom:'6px',padding:'4px'}} placeholder="Item Name" value={calcName} onChange={e=>setCalcName(e.target.value)}/><button style={btn('primary')} onClick={addCalcItem} disabled={itemsSaving}>Add to Shop</button></div>}</div>}{adminTab==='settings'&&<div style={sec}><div style={stl}>Settings</div><label style={lbl}>Currency</label><input style={{...inp,maxWidth:'240px',marginBottom:'12px'}} value={editCurrency} onChange={e=>setEditCurrency(e.target.value)}/><button style={btn('primary')} onClick={saveSettings}>Save</button></div>}</div>}</div>
)}
</div></div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
